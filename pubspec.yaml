name: newxeom
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_riverpod: ^3.3.1
  carousel_slider: ^5.1.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  supabase_flutter: ^2.12.4
  http: ^1.6.0
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/NEWS.jpg
    - assets/XEOMLOGO.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/XEOMLOGO.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8F5EE"
  image: "assets/XEOMLOGO.jpg"
  android: true
  ios: true
