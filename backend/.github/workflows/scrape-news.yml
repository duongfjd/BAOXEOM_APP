name: Báo Xe Ôm Auto Scraper Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    # Chạy mỗi 1 tiếng (00:00, 01:00, 02:00, ...)
    - cron: '0 * * * *'
  workflow_dispatch: # Cho phép nhấn nút kích hoạt thủ công trên trình duyệt web Github

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Clone Repository Báo Xe Ôm
        uses: actions/checkout@v4

      - name: ⚙️ Khởi động Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Cài đặt thư viện Node Module Pkgs
        run: npm install

      - name: 🚀 Khởi chạy hệ thống Báo Xe Ôm AI
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_API_URL: ${{ secrets.NEWS_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          POLLINATIONS_BASE_URL: ${{ secrets.POLLINATIONS_BASE_URL }}
          POLLINATIONS_MODEL: ${{ secrets.POLLINATIONS_MODEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node run.js
